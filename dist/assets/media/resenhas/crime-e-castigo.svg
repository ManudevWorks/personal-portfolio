<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Crime e Castigo — dark literary book cover, 2:3 portrait -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#2d1a0e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  <!-- Spine line -->
  <rect x="0" y="0" width="6" height="600" fill="#C65D3B"/>
  <!-- Top decorative border -->
  <rect x="20" y="20" width="360" height="2" fill="#C65D3B" opacity=".6"/>
  <!-- Axe silhouette (symbolic) -->
  <g transform="translate(200,220)" fill="#FAF8F5" opacity=".08">
    <!-- Axe handle -->
    <rect x="-4" y="-80" width="8" height="160" rx="4"/>
    <!-- Axe head -->
    <path d="M 4,-60 L 50,-90 L 50,-30 Z"/>
  </g>
  <!-- Title text area -->
  <rect x="30" y="300" width="340" height="2" fill="#C65D3B" opacity=".4"/>
  <!-- "CRIME" placeholder block -->
  <rect x="30" y="320" width="200" height="28" fill="#FAF8F5" opacity=".9" rx="2"/>
  <!-- "E" -->
  <rect x="30" y="358" width="40" height="20" fill="#FAF8F5" opacity=".5" rx="2"/>
  <!-- "CASTIGO" -->
  <rect x="30" y="386" width="240" height="28" fill="#FAF8F5" opacity=".9" rx="2"/>
  <!-- Author line -->
  <rect x="30" y="440" width="260" height="14" fill="#C65D3B" opacity=".7" rx="2"/>
  <!-- Bottom decorative border -->
  <rect x="20" y="578" width="360" height="2" fill="#C65D3B" opacity=".6"/>
  <!-- Small dot motif -->
  <circle cx="200" cy="120" r="3" fill="#C65D3B" opacity=".5"/>
  <circle cx="200" cy="140" r="2" fill="#C65D3B" opacity=".3"/>
  <circle cx="200" cy="155" r="1.5" fill="#C65D3B" opacity=".2"/>
</svg>
