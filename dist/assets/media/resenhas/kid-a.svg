<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Kid A — glacial mountains, cold blue tones -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a4a7a"/>
      <stop offset="100%" stop-color="#0d2240"/>
    </linearGradient>
    <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e3860"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="400" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="40"  cy="30"  r="1.2" fill="#8ab4e8" opacity=".8"/>
  <circle cx="120" cy="15"  r="1"   fill="#8ab4e8" opacity=".6"/>
  <circle cx="200" cy="45"  r="1.5" fill="#8ab4e8" opacity=".9"/>
  <circle cx="310" cy="20"  r="1"   fill="#8ab4e8" opacity=".7"/>
  <circle cx="370" cy="60"  r="1.2" fill="#8ab4e8" opacity=".5"/>
  <circle cx="80"  cy="70"  r="0.8" fill="#8ab4e8" opacity=".6"/>
  <circle cx="260" cy="30"  r="1"   fill="#8ab4e8" opacity=".8"/>
  <!-- Back mountain range -->
  <polygon points="0,280 60,160 120,200 180,140 240,180 300,120 360,170 400,150 400,400 0,400" fill="url(#mtn2)" opacity=".7"/>
  <!-- Front mountain range -->
  <polygon points="0,320 80,200 140,240 200,170 260,220 320,160 380,200 400,190 400,400 0,400" fill="url(#mtn1)"/>
  <!-- Snow caps -->
  <polygon points="200,170 220,185 180,185" fill="#e8f0fa" opacity=".6"/>
  <polygon points="320,160 340,178 300,178" fill="#e8f0fa" opacity=".5"/>
  <polygon points="80,200 95,215 65,215"   fill="#e8f0fa" opacity=".4"/>
</svg>
