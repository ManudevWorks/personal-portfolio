<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- In Rainbows — colored squares on dark background -->
  <rect width="400" height="400" fill="#1A1A1A"/>
  <!-- Grid of colored squares (inspired by the album art palette) -->
  <rect x="20"  y="20"  width="88" height="88" fill="#C65D3B"/>
  <rect x="116" y="20"  width="88" height="88" fill="#E8A87C"/>
  <rect x="212" y="20"  width="88" height="88" fill="#C65D3B" opacity=".6"/>
  <rect x="308" y="20"  width="72" height="88" fill="#FAF8F5" opacity=".15"/>
  <rect x="20"  y="116" width="88" height="88" fill="#FAF8F5" opacity=".08"/>
  <rect x="116" y="116" width="88" height="88" fill="#C65D3B" opacity=".4"/>
  <rect x="212" y="116" width="88" height="88" fill="#E8A87C" opacity=".7"/>
  <rect x="308" y="116" width="72" height="88" fill="#C65D3B"/>
  <rect x="20"  y="212" width="88" height="88" fill="#E8A87C" opacity=".5"/>
  <rect x="116" y="212" width="88" height="88" fill="#FAF8F5" opacity=".1"/>
  <rect x="212" y="212" width="88" height="88" fill="#C65D3B" opacity=".8"/>
  <rect x="308" y="212" width="72" height="88" fill="#E8A87C" opacity=".3"/>
  <rect x="20"  y="308" width="88" height="72" fill="#C65D3B" opacity=".3"/>
  <rect x="116" y="308" width="88" height="72" fill="#E8A87C" opacity=".8"/>
  <rect x="212" y="308" width="88" height="72" fill="#FAF8F5" opacity=".12"/>
  <rect x="308" y="308" width="72" height="72" fill="#C65D3B" opacity=".5"/>
